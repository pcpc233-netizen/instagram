<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="alternate icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CardFlow — AI 카드뉴스 자동 제작 도구</title>
    <meta name="description" content="AI로 인스타그램 카드뉴스를 자동 제작하세요. 주제 입력 또는 블로그 URL만으로 슬라이드 완성. DALL-E 배경 이미지 생성, Buffer 자동 발행 지원." />
    <meta name="keywords" content="카드뉴스, AI 카드뉴스, 인스타그램 카드뉴스, 카드뉴스 제작, SNS 콘텐츠, 자동화, Buffer" />
    <meta name="author" content="CardFlow" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CardFlow — AI 카드뉴스 자동 제작" />
    <meta property="og:description" content="주제 입력만으로 인스타그램 카드뉴스 완성. AI 카피 + AI 배경 이미지 + Buffer 자동 발행" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CardFlow — AI 카드뉴스 자동 제작" />
    <meta name="twitter:description" content="주제 입력만으로 인스타그램 카드뉴스 완성" />
  </head>
  <body>
    <div id="root"></div>
    <div id="admin-root"></div>
    <script type="module">
      // Route based on hostname
      (async () => {
        if (window.location.hostname === 'admin.bustime.site') {
          // Load admin app
          document.getElementById('root').style.display = 'none';
          document.title = '관리자 대시보드 - 전국 교통정보 플랫폼';
          const metaRobots = document.querySelector('meta[name="robots"]');
          if (metaRobots) metaRobots.content = 'noindex, nofollow';

          await import('/src/admin-main.tsx');
        } else {
          // Load main app
          document.getElementById('admin-root').style.display = 'none';
          await import('/src/main.tsx');
        }
      })();
    </script>
  </body>
</html>
